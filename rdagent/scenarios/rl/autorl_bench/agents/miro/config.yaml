name: "Miro Agent"
description: "Single AutoRL-Bench wrapper for Miro-style external agents/frameworks. Prepares workspace context and delegates execution to one configurable entrypoint."
start: "start.sh"
env_vars:
  MIRO_TIMEOUT: "36000"
  MIRO_MODE: "command"
  MIRO_SYSTEM: "mirothinker"
  MIRO_ENTRYPOINT: ""
  MIRO_PROJECT_ROOT: "/root/cwy/projects/MiroThinker"
  MIRO_LLM_CONFIG: "qwen-3"
  MIRO_LLM_PROVIDER: "openai"
  MIRO_LLM_MODEL: "openrouter/openai/gpt-5.2"
  MIRO_LLM_BASE_URL: "http://10.100.193.46:4004/v1"
  MIRO_LLM_MAX_TOKENS: "1024"
  MIRO_JUDGE_UPSTREAM_MODEL: "openrouter/openai/gpt-4o"
